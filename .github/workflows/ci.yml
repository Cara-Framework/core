name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  framework:
    name: Lint, test and package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout framework
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: setup.py
      - name: Install locked test surface
        run: python -m pip install --disable-pip-version-check '.[all,dev]' build
      - name: Reject fatal Python lint errors
        run: python -m ruff check --select E9,F63,F7,F82 cara tests
      - name: Compile framework sources
        run: python -m compileall -q cara
      - name: Run framework tests
        run: python -m pytest tests -q
      - name: Build wheel and source distribution
        run: python -m build
